# .github/workflows/build-autostate.yml
#
# Builds the patched mgba_libretro core for:
#   • Windows 64-bit  (MinGW cross-compile on Ubuntu)
#   • Windows 32-bit  (MinGW cross-compile on Ubuntu)
#   • Linux 64-bit
#   • macOS (Intel + Apple Silicon universal)
#   • Android arm64-v8a
#   • Android armeabi-v7a
#   • Android x86_64
#
# Artifacts are uploaded so you can download them directly from the
# GitHub Actions run page without needing a release.
#
# Trigger: every push and pull-request, plus manual dispatch.
#
# NOTE: mGBA has pre-existing build issues on some platforms that require
# workarounds in the build command (see comments below). These are NOT
# caused by our patch - they exist in upstream mGBA's libretro build.

name: Build mGBA autostate

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------ #
  # Windows 64-bit (MinGW cross-compile)                               #
  #                                                                    #
  # mGBA has a pre-existing issue where thread.c references            #
  # mCoreRewind* and gba/core.c references mVideoThreadProxyCreate     #
  # functions that are not compiled in the libretro build. We work     #
  # around this by defining DISABLE_THREADING, which skips the         #
  # problematic calls in gba/core.c, and by compiling rewind.c         #
  # separately to fix the link errors.                                 #
  # ------------------------------------------------------------------ #
  build-win64:
    name: Windows x64 (MinGW)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64 toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            make

      - name: Build
        run: |
          # Build with DISABLE_THREADING to skip mVideoThreadProxyCreate
          # calls, and add rewind.c to the build to fix mCoreRewind* errors.
          make -f Makefile.libretro \
               platform=mingw_x86_64 \
               CC=x86_64-w64-mingw32-gcc \
               CXX=x86_64-w64-mingw32-g++ \
               CFLAGS="-DDISABLE_THREADING" \
               LDFLAGS="-lm" \
               -j$(nproc) || true

          # If first build failed, compile rewind.c separately and retry
          if [ ! -f mgba_libretro.mingw_x86_64.dll ]; then
            echo "First build failed, compiling rewind.c separately..."
            x86_64-w64-mingw32-gcc -c \
              -D__LIBRETRO__ -DMINIMAL_CORE=2 -DM_CORE_GBA -DM_CORE_GB \
              -DENABLE_VFS -DENABLE_DIRECTORIES -DHAVE_STDINT_H -DHAVE_INTTYPES_H \
              -DINLINE=inline -DCOLOR_16_BIT -DRESAMPLE_LIBRARY=2 \
              -DM_PI=3.14159265358979323846 -DMGBA_STANDALONE -DPATH_MAX=4096 \
              -DNDEBUG -DCOLOR_5_6_5 -DENABLE_VFS_FD -DDISABLE_THREADING \
              -I./src -I./src/arm -I./include -I./src/platform/libretro \
              -o src/core/rewind.mingw_x86_64.o src/core/rewind.c
            make -f Makefile.libretro \
                 platform=mingw_x86_64 \
                 CC=x86_64-w64-mingw32-gcc \
                 CXX=x86_64-w64-mingw32-g++ \
                 CFLAGS="-DDISABLE_THREADING" \
                 -j$(nproc)
          fi

      - name: Stage artifact
        run: |
          mkdir -p dist
          DLL=$(find . -name "mgba_libretro*.dll" -type f | head -1)
          if [ -z "$DLL" ]; then
            echo "ERROR: No DLL was built"
            exit 1
          fi
          cp "$DLL" dist/mgba_libretro_win64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_win64
          path: dist/mgba_libretro_win64.dll

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mgba_libretro_win64.dll

  # ------------------------------------------------------------------ #
  # Windows 32-bit (MinGW cross-compile)                               #
  # ------------------------------------------------------------------ #
  build-win32:
    name: Windows x86 (MinGW)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64 toolchain (32-bit)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-i686 \
            g++-mingw-w64-i686 \
            make

      - name: Build
        run: |
          make -f Makefile.libretro \
               platform=mingw_x86 \
               CC=i686-w64-mingw32-gcc \
               CXX=i686-w64-mingw32-g++ \
               CFLAGS="-DDISABLE_THREADING" \
               -j$(nproc) || true

          if [ ! -f mgba_libretro.mingw_x86.dll ]; then
            echo "First build failed, compiling rewind.c separately..."
            i686-w64-mingw32-gcc -c \
              -D__LIBRETRO__ -DMINIMAL_CORE=2 -DM_CORE_GBA -DM_CORE_GB \
              -DENABLE_VFS -DENABLE_DIRECTORIES -DHAVE_STDINT_H -DHAVE_INTTYPES_H \
              -DINLINE=inline -DCOLOR_16_BIT -DRESAMPLE_LIBRARY=2 \
              -DM_PI=3.14159265358979323846 -DMGBA_STANDALONE -DPATH_MAX=4096 \
              -DNDEBUG -DCOLOR_5_6_5 -DENABLE_VFS_FD -DDISABLE_THREADING \
              -I./src -I./src/arm -I./include -I./src/platform/libretro \
              -o src/core/rewind.mingw_x86.o src/core/rewind.c
            make -f Makefile.libretro \
                 platform=mingw_x86 \
                 CC=i686-w64-mingw32-gcc \
                 CXX=i686-w64-mingw32-g++ \
                 CFLAGS="-DDISABLE_THREADING" \
                 -j$(nproc)
          fi

      - name: Stage artifact
        run: |
          mkdir -p dist
          DLL=$(find . -name "mgba_libretro*.dll" -type f | head -1)
          if [ -z "$DLL" ]; then
            echo "ERROR: No DLL was built"
            exit 1
          fi
          cp "$DLL" dist/mgba_libretro_win32.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_win32
          path: dist/mgba_libretro_win32.dll

  # ------------------------------------------------------------------ #
  # Linux 64-bit                                                       #
  # ------------------------------------------------------------------ #
  build-linux64:
    name: Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            make

      - name: Build
        run: |
          make -f Makefile.libretro \
               platform=unix \
               LDFLAGS="-ldl" \
               -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_linux64
          path: mgba_libretro.so

  # ------------------------------------------------------------------ #
  # macOS (Intel + Apple Silicon universal)                            #
  # ------------------------------------------------------------------ #
  build-macos:
    name: macOS Universal
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ARM64 version
        run: |
          make -f Makefile.libretro clean || true
          make -f Makefile.libretro \
               platform=osx \
               UNAME_S=$(uname -s) \
               UNAME_M=arm64 \
               -j$(sysctl -n hw.ncpu)
          cp mgba_libretro.dylib mgba_libretro_arm64.dylib

      - name: Build x86_64 version
        run: |
          make -f Makefile.libretro clean
          make -f Makefile.libretro \
               platform=osx \
               UNAME_S=$(uname -s) \
               UNAME_M=x86_64 \
               -j$(sysctl -n hw.ncpu)
          cp mgba_libretro.dylib mgba_libretro_x86_64.dylib

      - name: Create universal binary
        run: |
          lipo -create -output mgba_libretro.dylib \
               mgba_libretro_arm64.dylib \
               mgba_libretro_x86_64.dylib
          file mgba_libretro.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_macos
          path: mgba_libretro.dylib

  # ------------------------------------------------------------------ #
  # Android — arm64-v8a / armeabi-v7a / x86_64                        #
  #                                                                    #
  # mGBA has a pre-existing issue with the Android NDK where           #
  # strtof_l in src/util/formatting.c conflicts with the NDK's         #
  # legacy_stdlib_inlines.h. We work around this by defining           #
  # HAVE_STRTOF_L to skip the conflicting definition.                  #
  # ------------------------------------------------------------------ #
  build-android:
    name: Android ${{ matrix.abi }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            ndk_target: aarch64-linux-android
            platform: android_arm64-v8a
            artifact_suffix: android_arm64-v8a

          - abi: armeabi-v7a
            ndk_target: armv7a-linux-androideabi
            platform: android_armeabi-v7a
            artifact_suffix: android_armeabi-v7a

          - abi: x86_64
            ndk_target: x86_64-linux-android
            platform: android_x86_64
            artifact_suffix: android_x86_64

    env:
      ANDROID_API: 21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        run: |
          # Try to find an already-installed NDK with a valid toolchain
          for ndk_dir in ${ANDROID_HOME}/ndk/*/; do
            if [ -f "${ndk_dir}toolchains/llvm/prebuilt/linux-x86_64/bin/clang" ]; then
              echo "NDK_ROOT=${ndk_dir%/}" >> $GITHUB_ENV
              echo "Found pre-installed NDK: ${ndk_dir%/}"
              exit 0
            fi
          done

          # No usable NDK found — install one via sdkmanager
          SDKMANAGER=$(find "${ANDROID_HOME}" -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: No sdkmanager found and no NDK pre-installed"
            exit 1
          fi

          echo "Installing NDK via: $SDKMANAGER"
          yes | "$SDKMANAGER" "ndk;27.0.12077973" 2>&1 | tail -5

          NDK_ROOT="${ANDROID_HOME}/ndk/27.0.12077973"
          if [ ! -f "${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" ]; then
            echo "ERROR: NDK installation failed — clang not found"
            exit 1
          fi

          echo "NDK_ROOT=${NDK_ROOT}" >> $GITHUB_ENV
          echo "Installed NDK: ${NDK_ROOT}"

      - name: Install make
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make

      - name: Build
        run: |
          echo "Using NDK_ROOT=$NDK_ROOT"
          TOOLCHAIN=${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64
          CC="${TOOLCHAIN}/bin/${{ matrix.ndk_target }}${{ env.ANDROID_API }}-clang"
          CXX="${TOOLCHAIN}/bin/${{ matrix.ndk_target }}${{ env.ANDROID_API }}-clang++"
          AR="${TOOLCHAIN}/bin/llvm-ar"
          RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
          STRIP="${TOOLCHAIN}/bin/llvm-strip"

          # Verify the compiler actually exists
          if [ ! -f "$CC" ]; then
            echo "ERROR: Compiler not found: $CC"
            ls -la "${TOOLCHAIN}/bin/"*clang* || true
            exit 1
          fi

          # Use mGBA's dedicated Android platform target.
          # Add -DHAVE_STRTOF_L to CFLAGS to fix the pre-existing conflict
          # between mGBA's strtof_l definition and the NDK's
          # legacy_stdlib_inlines.h strtof_l.
          # Also add -DDISABLE_THREADING to skip mVideoThreadProxyCreate calls.
          make -f Makefile.libretro \
            platform=${{ matrix.platform }} \
            CC="$CC" \
            CXX="$CXX" \
            AR="$AR" \
            RANLIB="$RANLIB" \
            STRIP="$STRIP" \
            CFLAGS="-DHAVE_STRTOF_L -DDISABLE_THREADING" \
            -j$(nproc)

      - name: Stage artifact
        run: |
          SO=$(find . -name "mgba_libretro*.so" -type f | head -1)
          if [ -z "$SO" ]; then
            echo "ERROR: No .so was built"
            exit 1
          fi
          cp "$SO" mgba_libretro_${{ matrix.artifact_suffix }}.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_${{ matrix.artifact_suffix }}
          path: mgba_libretro_${{ matrix.artifact_suffix }}.so
